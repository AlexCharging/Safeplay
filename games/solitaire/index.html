<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Solitaire — SafePlay</title>
  <link rel="stylesheet" href="../../css/main.css" />
</head>

<body>

  <div class="solitaire-page">

    <a href="../../index.html" class="back-btn">← Back to games</a>

    <h2 class="game-title">Solitaire</h2>

    <div id="game">

      <div id="top-row">

        <div id="stock" class="pile"></div>
        <div id="waste" class="pile"></div>

        <div id="foundations">
          <div class="foundation" data-f="0"></div>
          <div class="foundation" data-f="1"></div>
          <div class="foundation" data-f="2"></div>
          <div class="foundation" data-f="3"></div>
        </div>

      </div>

      <div id="tableau">
        <div class="column" data-col="0"></div>
        <div class="column" data-col="1"></div>
        <div class="column" data-col="2"></div>
        <div class="column" data-col="3"></div>
        <div class="column" data-col="4"></div>
        <div class="column" data-col="5"></div>
        <div class="column" data-col="6"></div>
      </div>

    </div>

  </div>

<script type="module" src="solitaire.js"></script>

</body>
</html>
